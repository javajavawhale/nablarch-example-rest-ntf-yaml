testCharsetAndLength:
  LIST_MAP=charsetAndLength: #ListMap
    - propertyName: "projectName"
      allowEmpty: "x"
      min: ""
      max: "64"
      interpolateKey_1: "max"
      interpolateValue_1: "64"
      messageIdWhenNotApplicable: "{nablarch.core.validation.ee.SystemChar.message}"
      "半角英字": "x"
      "半角数字": "x"
      "半角記号": "x"
      "半角カナ": "x"
      "全角英字": "o"
      "全角数字": "o"
      "全角ひらがな": "o"
      "全角カタカナ": "o"
      "全角漢字": "o"
      "全角記号その他": "o"
      "外字": "o"
      "中国語": "x"
      "サロゲートペア": "x"
      "改行": "x"

testSingleValidation:
  LIST_MAP=singleValidation: #ListMap
    - propertyName: "projectId"
      input1: ""
      messageId: "{nablarch.core.validation.ee.Required.message}"
      interpolateKey_1: ""
      interpolateValue_1: ""
    - propertyName: "projectId"
      input1: "${半角数字,9}"
      messageId: ""
      interpolateKey_1: ""
      interpolateValue_1: ""
    - propertyName: "projectId"
      input1: "1${半角数字,9}"
      messageId: "{nablarch.core.validation.ee.Digits.integer.message}"
      interpolateKey_1: ""
      interpolateValue_1: ""
    - propertyName: "projectId"
      input1: "\"-1\""
      messageId: "{nablarch.core.validation.ee.NumberRange.min.message}"
      interpolateKey_1: "min"
      interpolateValue_1: "0"
